<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            width: 1000px;
            height: 1000px;
            border: 1px solid #000;
        }
        .parent>.son {
            width: 150px;
            height: 150px;
            border: 1px solid #000;
            background-color: orange;
            transition: .7s;
        }
        .parent:hover>.son {
            /* 위치이동 */
            /* transform: translate(500px, 500px); */
            /* transform: translateX(700px); */
            transform: translateY(850px);

            /* 크기조정 */
            transform: scale(2, 2);
            /* 회전 */
            transform: rotate(270deg);
            /* 기울이기 */
            transform: skew(30deg);
            /* 동시적용 */
            transform: translate(850px, 850px) scale(2, 2) rotate(270deg);
        }   
    </style>
</head>
<body>
    
    <div class="parent">
        <div class="son"></div>
    </div>

</body>
</html>
