<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* reset */
        * {box-sizing: border-box;}
        body {
            margin: 0;
            padding: 0;
        }
        input {
            height: 30px;
            outline: none;
            border-radius: 0;
            border: 1px solid #000;
        }
       
        select {
            width: 100%;
            height: 30px;
            outline: none;
            border-radius: 0;
            border: 1px solid #000;
        }
        a {
            text-decoration: none;
            color: #000;
        }
        /* style */
        form {
            width: 500px;
            margin: 0 auto; 
        }
        form .row {
            display: flex;
            flex-direction: column;
        }
        form .row .input-group {
            display: flex;
            gap: 10px;
        }
        form .row .btn-group {
            display: flex;
            gap: 10px;
        }
        /* form .row.userid label{
           flex: 1;
        }
        form .row.userid .btn-userid{
           flex: 2;
        }
        form .row.email {
           display: block;
        }
        form .row.email label{
           display: block;
        }
        form .row input{
            flex : 1;
        }
        form .row label .btn-userid{
            width: 50px;
        } */
    </style>
</head>

<body>
    <div class="wrapper">
        <form action="">
            <h2>회원가입</h2>
            <p>회원이 되어 다양한 혜택을 경험해 보세요!</p>
            <div class="row">
                <label>아이디</label>
                <div class="input-group">
                    <input type="text" name="userid">
                    <button>중복 확인</button>
                </div>
            </div>
            <div class="row">
                <label>비밀번호</label>
                <input type="password" name="password">
            </div>
            <div class="row">
                <label>비밀번호 확인</label>
                <input type="password" name="password">
            </div>
            <div class="row">
                <label>이름</label>
                <input type="text" name="username">
            </div>
            <div class="row">
                <label>전화번호</label>
                <input type="tel">
            </div>
            <div class="row">
                <label>이메일주소</label>
                <div class="input-group">
                    <input type="text">
                    <span>@</span>
                    <input type="text">
                    <select name="" id="">
                        <option value="">naver.com</option>
                        <option value="">gmail.com</option>
                        <option value="">daum.net</option>
                        <option value="">직접입력</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <label>생년월일</label>
                <div class="input-group">
                    <select name="" id="">
                        <option value="">1990년</option>
                        <option value="">1991년</option>
                        <option value="">1992년</option>
                    </select>
                    <select name="" id="">
                        <option value="">1월</option>
                        <option value="">2월</option>
                        <option value="">3월</option>
                    </select>
                    <select name="" id="">
                        <option value="">1일</option>
                        <option value="">2일</option>
                        <option value="">3일</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="btn-group">
                    <input type="submit" value="가입하기">
                    <button>가입취소</button>
                </div>
            </div>
            
        </form>
    </div>
</body>

</html>
