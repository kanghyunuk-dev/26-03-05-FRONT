<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>
        // 배열 : 여러 자료Type을 저장학 위한 자료구조
        // 배열은 순선번호(Index) 를 가지고 있고 번홀르 통해서 요소값에 접근가능
        let arr = ['str1',"str2", 'str3', null, true, false, undefined, {name:"홍길동", age:35}];
        // console.log(arr);
        // console.log(arr[0]);
        // console.log(arr[1]);
        // console.log(arr[2]);
        // console.log(arr[3]);
        // console.log(arr[4]);
        // console.log(arr[5]);
        // console.log(arr[6]);
        // 자바스크립의 배열은 동적확장이 가능하다
        arr[8] = 100;
        // console.log(arr);
        arr[12] = "HELLO WORLD";
        // console.log(arr);
        // console.log(typeof arr[9], typeof arr[10]);

        // 배열함수
        // push(마지막 index+1 에 값 추가), pop(마지막 index 값 제거)
        arr.push("aaa");
        arr.push("bbb");
        arr.push("ccc");
        // console.log(arr);
        // console.log(arr.pop());
        // console.log(arr.pop());

        // forEach
        // 배열 내의 모든 요소를 순차적으로 접근하는 반복구문
        // Callback함수(로직을 전달, ()=>{})
        // arr.forEach((요소명)=>{처리할 코드})
        // arr.forEach((item, idx)=>{console.log(idx, 'item',item)})

        // 정렬 : sort((비교인자1, 비교인자2)=>{return 비교인자1 - 비교인자2})
        // 오름차순 : arr.sort((a,b)=>{return a-b})
        // 내림차순 : arr.sort((a,b)=>{return b-a})
        // 기존 배열에서 정렬 진행
        let arr2 = [10,55,11,24,6,44,1,22]
        // 오름차순
        arr2.sort((a,b)=>{return a-b});
        // console.log(arr2);
        // 내림차순
        arr2.sort((a,b)=>{return b-a});
        // console.log(arr2);
        // 내림차순(약식)
        arr2.sort((a,b)=>b-a);

        // 필터 : 배열내에서 특정 요소만 필터링
        // arr.filter((요소명)=>{return 조건식})
        // 필터링된 요소만 묶은 배열이 따로 생성
        let arr3 = ['str1',"str2", 'str3', 7, null, true, 11, false, undefined, {name:"홍길동", age:35}, 99, 10, 1];
        const filtered_01 = arr3.filter((item)=>{return typeof item == 'number'});
        console.log('filtered_01', filtered_01);

        const filtered_02 = arr3.filter((item)=>{return typeof item == 'string'});
        console.log('filtered_02', filtered_02);

        const filtered_03 = arr3.filter(item => typeof item == 'object');
        console.log('filtered_03', filtered_03);

        // 누산 : 누적합, 누적곱.... 누적작업
        // arr.reduce((누적변수, 요소명)=>{로직처리}, 누산변수 초기값)
        let arr4 = ['str1',"str2", 'str3', 7, null, true, 11, false, undefined, {name:"홍길동", age:35}, 99, 10, 1];

        const result = 
        arr4.filter((item)=>{return typeof item == 'number'})
            .reduce((sum, item)=>{
                console.log(item);
                return sum+item;}, 0);
        console.log("result", result);
        
        const result2 =
        arr4.filter((item)=>{return typeof item == 'number'})
            .reduce((mul, item)=>{
                console.log("mul :" + mul);
                console.log(item);
                return mul*item;}, 1);
        console.log("result", result2);

        // 배열object 처리 [{},{},{}...]
        let products = [
            {"pid" : 1, "pname" : "삼성모니터", "price" : 100, "amount" : 100},
            {"pid" : 2, "pname" : "노트북", "price" : 200, "amount" : 200},
            {"pid" : 3, "pname" : "냉장고", "price" : 300, "amount" : 300},
            {"pid" : 4, "pname" : "데스크탑", "price" : 400, "amount" : 400},
            {"pid" : 5, "pname" : "가습기", "price" : 500, "amount" : 500},
        ];
        console.log("products", products);
        // forEach
        products.forEach((item)=>{console.log("item : " , item);});
        products.forEach(item => console.log("itemLog",item));
        

        products.forEach((item,idx)=>{console.log(idx, item["pname"],item["price"]);})
        products.forEach((item,idx)=>{console.log(idx, item.pname,item.price);})

        // filter : item의 가격이 100이상인 object만 필터링
        const result_1 = products.filter((item)=>{return item.price>=100});
        console.log("result", result_1);

        // item의 수량이 300개 이하의 object만 필터링(<=)
        const result_2 = products.filter((item)=>{
            console.log(item);
            return item.amount < 300});
        console.log("result2 ", result_2);

        // reduce
        // 각 아이템 가격이 100만원 이상인 item의 재고량*가격 총합(누적)을 구하세요.
        const result_3 = products.filter((item)=>{return item.price>=100;})
                                .reduce((sum, item)=>{return item.price * item.amount},0)
        console.log("result_3",result_3);

        // map : 기존 배열의 새로운 형태의 배열로 재구성
        // arr.map((요소명)=>{return 재구성할 요소의 형태})
        // 새로운 배열이 만들어짐
        // 
        // products 배열의 각 요소 {}에 제품별 총판매액(totalPrice : amount*price) 속성을 추가
        const result_4 = products.map((item)=>{
            console.log("맵안",item);
            // ...(스프레드 연산자) : .object의 기존 속성 그대로 가져올때 사용
            item = {/* '기존 속성들' */...item,"totalPrice" : item.price*item.amount}
            console.log("맵안",item);
            return item;
        });
        console.log("result_4", result_4);

        //----------------------------------
        // 문제
        //----------------------------------
        let employees = [
            { id: 1, name: "김철수", age: 35, department: "개발", salary: 6000, years: 10 },
            { id: 2, name: "이영희", age: 28, department: "디자인", salary: 5000, years: 5 },
            { id: 3, name: "박지성", age: 40, department: "마케팅", salary: 7000, years: 15 },
            { id: 4, name: "손흥민", age: 30, department: "개발", salary: 6500, years: 7 },
            { id: 5, name: "정우성", age: 45, department: "경영", salary: 9000, years: 20 },
            { id: 6, name: "한지민", age: 29, department: "디자인", salary: 5200, years: 6 },
            { id: 7, name: "강호동", age: 50, department: "경영", salary: 8500, years: 25 },
            { id: 8, name: "유재석", age: 42, department: "마케팅", salary: 7500, years: 18 },
            { id: 9, name: "송중기", age: 32, department: "개발", salary: 6200, years: 8 },
            { id: 10, name: "수지", age: 26,  department: "디자인", salary: 4800, years: 3 }
        ];
        console.log(employees);
        // 연봉이(salary) 6000이상이면서 근속연수(years)가 7년이상인(item.salary>=6000 && item.years>=7) 직원만 필터링해서 배열로 저장 확인
        let employeesResult =
        employees.filter((item)=>{return item.salary>=6000 && item.years>=7});
        console.log("employees",employeesResult);

        // 모든 직원의 연봉(salary) 기준으로 내림차순 정렬한 배열 새로 만들기
        console.log("employees.salary",employees.salary);
        let employeesSalaryResult =
        employees.sort((a,b)=> { return b.salary - a.salary});
        console.log("employeesSalaryResult", employeesSalaryResult);

        const employeesSalaryResult2 = employees.map((item)=>{return item;})
                                                .sort((a,b)=> {return b.salary - a.salary});
        console.log("employeesSalaryResult2", employeesSalaryResult2);                                                

        // 모든 직원의 연봉(salary) 에 근속연수*100 만큼의 보너스를 추가하여 total_salary필드를 추가한 배열을 반환
        let total_salary = employees.map((item)=>{
            item = {...item, "total_salary" : item.salary + (item.years * 100)}
            return item
        });
        console.log("total_salary", total_salary);

        // department(부서) 별로 직원들의 연봉총합을 구하세요
        const r4 = employees.reduce((sum,item)=>{
            console.log('item', item.department, item.salary);
            sum[item.department] = sum[item.department]==undefined? item.salary : sum[item.department]+=item.salary;
            return sum;
        },{}/* object 형태*/)
        console.log("r4",r4);

        // 연봉(salary)가 가장높은 직원을 찾아 객체하나만 반환(mdn문서에서 find를 찾아보세요 - !)
        const maxItem = employees.sort((a,b) => {return b.salary - a.salary;})[0]
        console.log("maxItem", maxItem);

        //최대값 구하기
        const maxSalary = employees.reduce((maxValue, item) => {
            maxValue = item.salary > maxValue ? item.salary : maxValue;
            return maxValue;
        },0)
        console.log("maxSalary", maxSalary);
        

    </script>
</body>
</html>
